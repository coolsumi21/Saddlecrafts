---
layout: default
title: SaddleCrafts Design Studio
---

<div class="container" style="max-width: 800px; margin: 20px auto; background: #141414; padding: 20px; border-radius: 12px; border: 1px solid #222; text-align: center; color: #fff;">
    <h1>SADDLECRAFTS DESIGN STUDIO</h1>
    
    <!-- This pulls in your 3D viewer window smoothly -->
    <model-viewer id="seat" src="my-scanned-seat.glb" camera-controls shadow-intensity="1" ar style="width: 100%; height: 450px; background-color: #1a1a1a; border-radius: 8px; margin: 0 auto;"></model-viewer>

    <div class="price-tag" style="font-size: 24px; color: #d4af37; margin: 20px 0; font-weight: bold;">Total Price: $<span id="price">150</span> USD</div>

    <h3>Choose Your Style:</h3>
    <div class="btn-group" style="display: flex; justify-content: center; gap: 15px; margin-top: 15px; flex-wrap: wrap;">
        <button onclick="applyStyle('standard-leather.jpg', 150)" style="background: #d4af37; color: #000; border: none; padding: 12px 24px; font-weight: bold; border-radius: 6px; cursor: pointer;">Standard Smooth</button>
        <button onclick="applyStyle('diamond-pattern.jpg', 185)" style="background: #d4af37; color: #000; border: none; padding: 12px 24px; font-weight: bold; border-radius: 6px; cursor: pointer;">Premium Diamond Stitch</button>
        <button onclick="applyStyle('ribbed-pattern.jpg', 175)" style="background: #d4af37; color: #000; border: none; padding: 12px 24px; font-weight: bold; border-radius: 6px; cursor: pointer;">Vintage Ribbed Stitch</button>
    </div>
</div>

<script>
    async function applyStyle(textureFile, basePrice) {
        document.getElementById("price").innerText = basePrice;
        const modelViewer = document.querySelector("#seat");
        if (modelViewer.model) {
            const material = modelViewer.model.materials[0];
            const texture = await modelViewer.createTexture(textureFile);
            material.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
        }
    }
</script>
