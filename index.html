<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaddleCrafts Studio</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0b0b0b; color: #fff; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background: #141414; padding: 20px; border-radius: 12px; border: 1px solid #222; }
        model-viewer { width: 100%; height: 450px; background-color: #1a1a1a; border-radius: 8px; }
        .price-tag { font-size: 24px; color: #d4af37; margin: 20px 0; font-weight: bold; }
        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        button { background: #d4af37; color: #000; border: none; padding: 12px 24px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>SADDLECRAFTS DESIGN STUDIO</h1>
    
    <!-- Your phone-scanned 3D file goes here -->
    <model-viewer id="seat" src="my-scanned-seat.glb" camera-controls shadow-intensity="1" ar></model-viewer>

    <!-- Dynamic Price Display -->
    <div class="price-tag">Total Price: $<span id="price">150</span> USD</div>

    <h3>Choose Your Style:</h3>
    <div class="btn-group">
        <button onclick="applyStyle('standard-leather.jpg', 150)">Standard Smooth</button>
        <button onclick="applyStyle('diamond-pattern.jpg', 185)">Premium Diamond Stitch</button>
        <button onclick="applyStyle('ribbed-pattern.jpg', 175)">Vintage Ribbed Stitch</button>
    </div>
</div>

    
<script>
    async function applyStyle(textureFile, basePrice) {
        // Update the price on screen instantly
        document.getElementById("price").innerText = basePrice;

        // Apply the new texture to the 3D model
        const modelViewer = document.querySelector("#seat");
        if (modelViewer.model) {
            const material = modelViewer.model.materials[0];
            const texture = await modelViewer.createTexture(textureFile);
            material.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
        }
    }
</script>

</body>
</html>
